<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post Title - My Blog</title>
    <link rel="icon" href="\img\logo.png" type="image/x-icon" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
      }

      body {
        background-color: #0a192f;
        line-height: 1.6;
        color: #8892b0;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }

      header {
        text-align: center;
        padding: 40px 0;
        background: rgba(255, 255, 255, 0.05);
        margin-bottom: 40px;
        backdrop-filter: blur(10px);
      }

      .back-link {
        display: inline-block;
        color: #64ffda;
        text-decoration: none;
        margin-bottom: 20px;
        transition: opacity 0.3s;
      }

      .back-link:hover {
        opacity: 0.8;
      }

      .post-header {
        margin-bottom: 40px;
      }

      .post-category {
        background-color: rgba(100, 255, 218, 0.1);
        padding: 5px 10px;
        border-radius: 15px;
        font-size: 0.8rem;
        color: #64ffda;
        display: inline-block;
        margin-bottom: 15px;
        border: 1px solid #64ffda;
      }

      .post-title {
        font-size: 2.5rem;
        color: #ccd6f6;
        margin-bottom: 15px;
        line-height: 1.3;
      }

      .post-meta {
        color: #8892b0;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }

      .post-image {
        width: 100%;
        height: 400px;
        background-color: rgba(255, 255, 255, 0.05);
        background-size: cover;
        background-position: center;
        margin-bottom: 30px;
        border-radius: 10px;
      }

      .post-content {
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 10px;
        margin-bottom: 40px;
      }

      /* Blog content styling */
      .post-content h2 {
        color: #ccd6f6;
        font-size: 1.8rem;
        margin: 40px 0 20px;
      }

      .post-content h3 {
        color: #ccd6f6;
        font-size: 1.4rem;
        margin: 30px 0 15px;
      }

      .post-content p {
        margin-bottom: 20px;
        font-size: 1.1rem;
        line-height: 1.8;
      }

      .post-content a {
        color: #64ffda;
        text-decoration: none;
      }

      .post-content a:hover {
        text-decoration: underline;
      }

      .post-content ul,
      .post-content ol {
        margin: 20px 0;
        padding-left: 20px;
      }

      .post-content li {
        margin-bottom: 10px;
      }

      .post-content blockquote {
        border-left: 3px solid #64ffda;
        padding-left: 20px;
        margin: 20px 0;
        font-style: italic;
        color: #ccd6f6;
      }

      .post-content code {
        background: rgba(255, 255, 255, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.9em;
      }

      .post-content pre {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 10px;
        overflow-x: auto;
        margin: 20px 0;
      }

      .post-content pre code {
        background: none;
        padding: 0;
      }

      .post-content img {
        max-width: 100%;
        border-radius: 10px;
        margin: 20px 0;
      }

      #markdown-content {
        display: none;
      }

      @media (max-width: 768px) {
        .container {
          padding: 15px;
        }

        .post-content {
          padding: 20px;
        }

        .post-title {
          font-size: 2rem;
        }
      }
    </style>
  </head>

  <body>
    <main class="container">
      <article>
        <div class="post-header">
          <span class="post-category">Category Name</span>
          <h1 class="post-title">Your Blog Post Title</h1>
          <div class="post-meta">
            <span>By Author Name</span>
            <span> • </span>
            <span>January 28, 2025</span>
            <span> • </span>
            <span>5 min read</span>
          </div>
        </div>

        <div
          class="post-image"
          style="background-image: url('/api/placeholder/800/400')"
        ></div>

        <div class="post-content" id="rendered-content">
          <!-- Content will be rendered here -->
        </div>

        <!-- Hidden textarea containing markdown content -->
        <textarea id="markdown-content">
# Welcome to My Blog

This is an example of how you can write your blog post in Markdown. It's **much easier** than writing HTML directly!

## Features

Here are some things you can do with Markdown:

- Write **bold** and *italic* text
- Create [links](https://example.com)
- Make lists (like this one!)
- Add code blocks

### Code Example

Here's a code example:

```javascript
const greeting = "Hello, World!";
console.log(greeting);
```

## Adding Quotes

You can easily add blockquotes:

> This is a blockquote. It's perfect for highlighting important information or including quotes from other sources.

## Images

You can include images using Markdown syntax:

![Alt text](/api/placeholder/800/400)

## Conclusion

Writing in Markdown is:
1. Faster
2. Easier
3. More maintainable

That's it! Happy blogging!
Thank you!
            </textarea
        >
      </article>
    </main>

    <script>
      // Configure marked options
      marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: true,
        highlight: function (code, language) {
          return code; // You can add syntax highlighting here if desired
        },
      });

      // Get the markdown content and render it
      const markdownContent = document.getElementById("markdown-content").value;
      const renderedContent = document.getElementById("rendered-content");
      renderedContent.innerHTML = marked.parse(markdownContent);
    </script>
  </body>
</html>
